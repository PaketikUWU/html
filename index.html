<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Links</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #0f0f12; /* Темный стильный фон */
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        .profile-img {
            width: 96px;
            height: 96px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #3f3f46;
            margin-bottom: 16px;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .username {
            color: #a1a1aa;
            font-size: 14px;
            margin-bottom: 32px;
        }

        .links-flex {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .link-card {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            background: #1e1e24;
            border: 1px solid #2d2d34;
            border-radius: 12px;
            color: #ffffff;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        /* Эффект при наведении */
        .link-card:hover {
            transform: translateY(-2px);
            background: #2a2a32;
            border-color: #8B0000; /* Цветная рамка при ховере */
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Твоя аватарка (замени ссылку на свою) -->
        <img class="profile-img" src="icon.png" alt="Avatar">
        
        <h1>Твой Никнейм</h1>
        <div class="paketikuwu">@paketikuwu</div>

        <div class="links-flex">
            <!-- Заменяй # на реальные ссылки -->
            <a href="https://t.me/paketikuwu" target="_blank" class="link-card">Telegram канал</a>
            <a href="#" target="_blank" class="link-card">Discord сервер</a>
            <a href="#" target="_blank" class="link-card">TikTok</a>
            <a href="https://www.faceit.com/ru/players/lilki" target="_blank" class="link-card">Faceit</a>
        </div>
    </div>

</body>
</html>
